services:

  # 1. VEKTÖR VERİTABANI SERVİSİ
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/cluster"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tesvik_network

  # 2. RAG SERVİSİ
  rag_service:
    build:
      context: .
      dockerfile: services/rag_service/Dockerfile
    container_name: rag_service
    ports:
      - "8002:8002"
    volumes:
      - ./services/rag_service:/app
      - ./shared:/app/shared
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - qdrant
    networks:
      - tesvik_network

  # 3. MATCHING SERVİSİ
  matching_service:
    build:
      context: .
      dockerfile: services/matching_service/Dockerfile
    container_name: matching_service
    ports:
      - "8003:8003"
    volumes:
      - ./services/ingestion_service/data:/app/data
      - ./services/matching_service:/app
      - ./shared:/app/shared
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload
    networks:
      - tesvik_network

  # 4. VERİ YÜKLEME SERVİSİ (sadece setup sırasında çalışır)
  ingestion_service:
    build:
      context: .
      dockerfile: services/ingestion_service/Dockerfile
    container_name: ingestion_service
    profiles:
      - setup
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - qdrant
    networks:
      - tesvik_network

volumes:
  qdrant_storage:

networks:
  tesvik_network:
    driver: bridge